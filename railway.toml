[build]
builder = "dockerfile"

[deploy]
startCommand = "sh -c \"php artisan config:clear 2>/dev/null; php artisan route:clear 2>/dev/null; php artisan view:clear 2>/dev/null; php artisan storage:link --force 2>/dev/null; php artisan migrate --force 2>/dev/null; php artisan db:seed --force 2>/dev/null; exec php artisan serve --host=0.0.0.0 --port=${PORT:-8080}\""
