[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_pgsql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.bcmath", "php84Extensions.gd", "php84Extensions.intl", "php84Extensions.redis", "nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "composer install --no-dev --optimize-autoloader --no-interaction --no-progress"
]

[phases.build]
cmds = [
  "pnpm build",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan storage:link"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
